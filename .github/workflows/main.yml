# This is a basic workflow to help you get started with Actions
name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"

  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: NPM Dependencies
        run: "PUPPETEER_SKIP_DOWNLOAD=true npm install"

      - name: Install JsonResume
        run: npm install resume-cli jsonresume-theme-relaxed

      - name: Generate Resume
        run: npx resume export public/sergei-golos-resume.pdf -t jsonresume-theme-relaxed

      - name: Generate Static Site
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: page
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: page
          path: .
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-profile-readme:
    runs-on: ubuntu-latest
    needs: build
    env:
      PROFILE_REPO_PAT: ${{ secrets.READMETOKEN }}
    steps:
      - name: Checkout portfolio source
        uses: actions/checkout@v4
        with:
          path: site

      - name: Skip profile publish when secret is missing
        if: ${{ env.PROFILE_REPO_PAT == '' }}
        run: echo "PROFILE_REPO_PAT is not set. Skipping profile README publish."

      - name: Checkout profile repository
        if: ${{ env.PROFILE_REPO_PAT != '' }}
        uses: actions/checkout@v4
        with:
          repository: SergeiGolos/SergeiGolos
          token: ${{ env.PROFILE_REPO_PAT }}
          path: profile

      - name: Sync profile README
        if: ${{ env.PROFILE_REPO_PAT != '' }}
        run: |
          cp site/template/README.md profile/README.md
          cd profile
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No README changes to publish."
            exit 0
          fi
          git add README.md
          git commit -m "chore: sync profile README from portfolio"
          git push
